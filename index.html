          type: "text",
          tabId: tab.id,
          itemId: null,
          field: "content",
          before: null,
          after: nextValue
        });
        scheduleSave();
      }
    };

    const handleInputBlur = (event) => {
      const tab = getActiveTab();
      if (!tab) return;
      const itemInput = event.target.closest(".item-input");
      const itemNote = event.target.closest(".item-note");
      const textEditor = event.target.closest(".text-editor");

      if (itemInput) {
        const itemId = itemInput.dataset.itemId;
        finalizeEditSession({ type: "item", tabId: tab.id, itemId, field: "text" });
      }
      if (itemNote) {
        const itemId = itemNote.dataset.itemId;
        finalizeEditSession({ type: "item", tabId: tab.id, itemId, field: "note" });
        if (!event.target.value.trim()) {
          runtime.openNotes.delete(itemId);
          render({ type: "item", itemId });
        }
      }
      if (textEditor) {
        finalizeEditSession({ type: "text", tabId: tab.id, itemId: null, field: "content" });
      }
    };

    const focusAdjacentVisibleItem = (tab, itemId, direction) => {
      const visibleIds = getVisibleItemIdList(tab);
      const currentIndex = visibleIds.indexOf(itemId);
      if (currentIndex === -1) return false;
      const nextId = visibleIds[currentIndex + direction];
      if (!nextId) return false;
      runtime.focused = { type: "item", itemId: nextId };
      render(runtime.focused);
      return true;
    };

    const handleOutlinerKeydown = (event) => {
      const tab = getActiveTab();
      if (!tab || tab.mode !== "outliner") return;
      const input = event.target.closest(".item-input");
      const note = event.target.closest(".item-note");

      if (note) {
        const itemId = note.dataset.itemId;
        if (event.key === "F2") {
          event.preventDefault();
          runtime.openNotes.delete(itemId);
          render({ type: "item", itemId });
          return;
        }
        return;
      }

      if (!input) return;
      const itemId = input.dataset.itemId;
      const item = getItem(tab, itemId);
      const index = findItemIndex(tab, itemId);
      if (!item || index === -1) return;

      const selectionStart = input.selectionStart;
      const selectionEnd = input.selectionEnd;

      if ((event.metaKey || event.ctrlKey) && !event.shiftKey && event.key.toLowerCase() === "z") {
        event.preventDefault();
        History.undo();
        return;
      }
      if ((event.metaKey || event.ctrlKey) && ((event.shiftKey && event.key.toLowerCase() === "z") || event.key.toLowerCase() === "y")) {
        event.preventDefault();
        History.redo();
        return;
      }

      if (event.key === "Enter" && !(event.metaKey || event.ctrlKey || event.shiftKey || event.altKey)) {
        event.preventDefault();
        finalizeEditSession({ type: "item", tabId: tab.id, itemId, field: "text" }, false);
        History.run(createSplitItemCommand(tab.id, itemId, selectionStart));
        return;
      }

      if (event.key === "Tab") {
        event.preventDefault();
        finalizeEditSession({ type: "item", tabId: tab.id, itemId, field: "text" }, false);
        const command = createChangeDepthCommand(tab.id, itemId, event.shiftKey ? -1 : 1);
        if (command) History.run(command);
        return;
      }

      if ((event.metaKey || event.ctrlKey) && event.key === "Enter") {
        event.preventDefault();
        finalizeEditSession({ type: "item", tabId: tab.id, itemId, field: "text" }, false);
        const command = createToggleCompleteCommand(tab.id, itemId);
        if (command) History.run(command);
        return;
      }

      if (event.key === "F2") {
        event.preventDefault();
        runtime.openNotes.add(itemId);
        render({ type: "note", itemId });
        return;
      }

      if ((event.metaKey || event.ctrlKey) && event.shiftKey && event.key === "ArrowUp") {
        event.preventDefault();
        finalizeEditSession({ type: "item", tabId: tab.id, itemId, field: "text" }, false);
        const command = createMoveSubtreeCommand(tab.id, itemId, -1);
        if (command) History.run(command);
        return;
      }

      if ((event.metaKey || event.ctrlKey) && event.shiftKey && event.key === "ArrowDown") {
        event.preventDefault();
        finalizeEditSession({ type: "item", tabId: tab.id, itemId, field: "text" }, false);
        const command = createMoveSubtreeCommand(tab.id, itemId, 1);
        if (command) History.run(command);
        return;
      }

      if (event.key === "Backspace" && selectionStart === 0 && selectionEnd === 0 && !input.value && getSubtreeCount(tab.items, index) === 1 && tab.items.length > 1) {
        event.preventDefault();
        finalizeEditSession({ type: "item", tabId: tab.id, itemId, field: "text" }, false);
        const command = createRemoveItemCommand(tab.id, itemId);
        if (command) History.run(command);
        return;
      }

      if (event.key === "ArrowUp" && selectionStart === 0 && selectionEnd === 0) {
        if (focusAdjacentVisibleItem(tab, itemId, -1)) {
          event.preventDefault();
        }
        return;
      }

      if (event.key === "ArrowDown" && selectionStart === input.value.length && selectionEnd === input.value.length) {
        if (focusAdjacentVisibleItem(tab, itemId, 1)) {
          event.preventDefault();
        }
      }
    };

    const handleTextEditorKeydown = (event) => {
      if (!event.target.closest(".text-editor")) return;
      const tab = getActiveTab();
      if (!tab || tab.mode !== "text") return;

      if ((event.metaKey || event.ctrlKey) && !event.shiftKey && event.key.toLowerCase() === "z") {
        event.preventDefault();
        History.undo();
        return;
      }
      if ((event.metaKey || event.ctrlKey) && ((event.shiftKey && event.key.toLowerCase() === "z") || event.key.toLowerCase() === "y")) {
        event.preventDefault();
        History.redo();
      }
    };

    const bindStaticEvents = () => {
      el.newTabBtn.addEventListener("click", openNewTabMenu);

      el.newTabMenu.addEventListener("click", (event) => {
        const btn = event.target.closest("[data-create-mode]");
        if (!btn) return;
        const mode = btn.dataset.createMode;
        closeMenus();
        History.run(createAddTabCommand(mode));
      });

      document.addEventListener("click", (event) => {
        if (!event.target.closest(".new-tab-wrap")) closeMenus();
      });

      el.tabScrollLeft.addEventListener("click", () => el.tabList.scrollBy({ left: -180, behavior: "smooth" }));
      el.tabScrollRight.addEventListener("click", () => el.tabList.scrollBy({ left: 180, behavior: "smooth" }));

      el.tabList.addEventListener("click", handleTabClick);
      el.tabList.addEventListener("dblclick", (event) => {
        if (event.target.closest("[data-tab-close]")) return;
        const tabEl = event.target.closest(".tab");
        if (!tabEl) return;
        const tabId = tabEl.dataset.tabId;
        if (!tabId) return;
        event.preventDefault();
        event.stopPropagation();
        if (tabId !== state.activeTabId) {
          setActiveTab(tabId);
          requestAnimationFrame(() => startTabRename(tabId));
        } else {
          startTabRename(tabId);
        }
      });

      el.tabList.addEventListener("keydown", (event) => {
        const input = event.target.closest(".tab-rename-input");
        if (!input) return;
        if (event.key === "Enter") {
          event.preventDefault();
          finishTabRename(input.dataset.tabId, input.value, { commit: true });
        } else if (event.key === "Escape") {
          event.preventDefault();
          finishTabRename(input.dataset.tabId, input.defaultValue, { commit: false });
        }
      });

      el.tabList.addEventListener("focusin", (event) => {
        const input = event.target.closest(".tab-rename-input");
        if (!input) return;
        input.select();
      });

      el.tabList.addEventListener("blur", (event) => {
        const input = event.target.closest(".tab-rename-input");
        if (!input) return;
        finishTabRename(input.dataset.tabId, input.value, { commit: true });
      }, true);

      let draggingTabId = null;
      el.tabList.addEventListener("dragstart", (event) => {
        if (runtime.renamingTabId || event.target.closest(".tab-rename-input")) {
          event.preventDefault();
          return;
        }
        const tabEl = event.target.closest(".tab");
        if (!tabEl) return;
        draggingTabId = tabEl.dataset.tabId;
        tabEl.classList.add("dragging");
        event.dataTransfer.effectAllowed = "move";
      });

      el.tabList.addEventListener("dragover", (event) => {
        const overTab = event.target.closest(".tab");
        if (!overTab || !draggingTabId) return;
        event.preventDefault();
        $$(".tab.drag-over", el.tabList).forEach((tabEl) => tabEl.classList.remove("drag-over"));
        if (overTab.dataset.tabId !== draggingTabId) overTab.classList.add("drag-over");
      });

      el.tabList.addEventListener("drop", (event) => {
        const overTab = event.target.closest(".tab");
        if (!overTab || !draggingTabId) return;
        event.preventDefault();
        const command = createReorderTabsCommand(draggingTabId, overTab.dataset.tabId);
        if (command) History.run(command);
      });

      el.tabList.addEventListener("dragend", () => {
        draggingTabId = null;
        $$(".tab", el.tabList).forEach((tabEl) => {
          tabEl.classList.remove("drag-over");
          tabEl.classList.remove("dragging");
        });
      });

      el.btnUndo.addEventListener("click", () => History.undo());
      el.btnRedo.addEventListener("click", () => History.redo());
      el.btnReload.addEventListener("click", reloadFromStorage);
      el.btnToggleCompleted.addEventListener("click", () => {
        runtime.showCompleted = !runtime.showCompleted;
        render(runtime.focused);
        scheduleSave();
        showToast(runtime.showCompleted ? "完了した項目を表示するで" : "完了した項目を隠したで");
      });
      el.btnCopy.addEventListener("click", copyCurrentTab);
      el.btnCopyJsonAll.addEventListener("click", copyAllTabsJson);
      el.btnImport.addEventListener("click", openImportModal);
      el.btnImportClose.addEventListener("click", closeImportModal);
      el.importModal.addEventListener("click", (event) => {
        if (event.target === el.importModal) closeImportModal();
      });
      el.btnImportReplaceJson.addEventListener("click", () => {
        const raw = el.importTextarea.value;
        try {
          const payload = parseImportPayload(raw);
          if (!confirm("現在の内容を置き換えますか？")) return;
          replaceStateFromImportedJson(payload);
        } catch (error) {
          showToast(error.message === "empty" ? "貼り付け内容が空やで" : "JSONとして読めへんかったで");
        }
      });
      el.btnImportAppendJson.addEventListener("click", () => {
        const raw = el.importTextarea.value;
        try {
          const payload = parseImportPayload(raw);
          appendTabsFromImportedJson(payload);
        } catch (error) {
          showToast(error.message === "empty" ? "貼り付け内容が空やで" : "JSONとして読めへんかったで");
        }
      });
      el.btnImportCurrentText.addEventListener("click", () => {
        const raw = el.importTextarea.value;
        if (!safeText(raw).trim()) {
          showToast("貼り付け内容が空やで");
          return;
        }
        importTextIntoCurrentTab(raw);
      });
      el.btnImportNewText.addEventListener("click", () => {
        const raw = el.importTextarea.value;
        if (!safeText(raw).trim()) {
          showToast("貼り付け内容が空やで");
          return;
        }
        importTextAsNewTab(raw);
      });
      el.btnDownloadTxt.addEventListener("click", () => downloadCurrentTab("txt"));
      el.btnDownloadMd.addEventListener("click", () => downloadCurrentTab("md"));
      el.btnRenameTab.addEventListener("click", renameCurrentTab);
      el.btnDuplicateTab.addEventListener("click", () => {
        const tab = getActiveTab();
        if (!tab) return;
        const command = createDuplicateTabCommand(tab.id);
        if (command) History.run(command);
      });
      el.btnDeleteTab.addEventListener("click", () => {
        const tab = getActiveTab();
        if (!tab) return;
        const command = createDeleteTabCommand(tab.id);
        if (command) History.run(command);
      });

      el.editor.addEventListener("click", handleRowActionClick);
      el.editor.addEventListener("focusin", handleInputFocus);
      el.editor.addEventListener("input", handleInputEvent);
      el.editor.addEventListener("focusout", handleInputBlur);
      el.editor.addEventListener("keydown", handleOutlinerKeydown);
      el.editor.addEventListener("keydown", handleTextEditorKeydown);

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !el.importModal.classList.contains("hidden")) {
          closeImportModal();
        }
      });

      window.addEventListener("beforeunload", () => Storage.save(state));
    };

    ensureState();
    bindStaticEvents();
    render();

    showToast("MemoToolを読み込んだで");
  })();
  </script>
</body>
</html>
